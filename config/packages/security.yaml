security:
    password_hashers:
        App\Entity\Utilisateur: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            access_denied_handler: App\Security\AccessDeniedHandler
            logout:
                path: app_logout
                target: app_home
                invalidate_session: true

    access_control:
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/chatbot, roles: ROLE_CLIENT }
        - { path: ^/admin, roles: ROLE_AGENT }
        - { path: ^/client, roles: ROLE_CLIENT }
        - { path: ^/offers, roles: ROLE_CLIENT }
        - { path: ^/waiting-approval, roles: ROLE_CLIENT }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
