parameters:
    # ton paramètre pour les réclamations
    reclamations_directory: '%kernel.project_dir%/public/uploads/reclamations'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\HCaptchaService:
        arguments:
            $hcaptchaSecretKey: '%env(HCAPTCHA_SECRET_KEY)%'
            $hcaptchaSiteKey: '%env(HCAPTCHA_SITE_KEY)%'

    App\Service\EmailService:
        arguments:
            $mailFromAddress: '%env(MAIL_FROM_ADDRESS)%'
            $mailFromName: '%env(MAIL_FROM_NAME)%'

    App\Service\ContractBrevoService:
        arguments:
            $brevoApiKey: '%env(BREVO_API_KEY)%'
            $brevoSenderEmail: '%env(BREVO_FROM)%'
            $brevoSenderName: '%env(BREVO_FROM_NAME)%'

    App\Service\ChatbotService:
        arguments:
            $ollamaUrl: '%env(OLLAMA_URL)%'

    App\Service\NewsService:
        arguments:
            $gnewsApiKey: '%env(GNEWS_API_KEY)%'

    App\Service\GrokService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    App\Service\AIService:
        arguments:
            $huggingfaceToken: '%env(HUGGINGFACE_TOKEN)%'

    App\EventListener\ExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception, priority: 10 }

    App\EventListener\BannedUserListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 20 }
